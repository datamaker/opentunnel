# OpenTunnel VPN — self-host stack (Rust server + PostgreSQL)
#
#   1. Generate TLS certs:   ./scripts/generate-certs.sh   (writes ./certs/server.{crt,key})
#   2. Set secrets in .env:  DB_PASSWORD, JWT_SECRET
#   3. Start:                docker compose up -d
#
services:
  vpn:
    image: datamaker/opentunnel:rust
    container_name: opentunnel-vpn
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./certs:/app/certs
    environment:
      - PORT=1194
      - ADMIN_PORT=8080
      - VPN_SUBNET=10.8.0.0
      - VPN_DNS=8.8.8.8,8.8.4.4
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=vpn
      - DB_USER=vpn
      - DB_PASSWORD=${DB_PASSWORD:-vpnpassword}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - TLS_CERT_PATH=/app/certs/server.crt
      - TLS_KEY_PATH=/app/certs/server.key
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: opentunnel-db
    restart: unless-stopped
    network_mode: host
    environment:
      - POSTGRES_DB=vpn
      - POSTGRES_USER=vpn
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vpnpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server-rust/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
