name: Build Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Compute version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"; else echo "APP_VERSION=0.0.0" >> "$GITHUB_ENV"; fi

      - name: Build APK
        working-directory: clients/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -PversionName=$APP_VERSION -PversionCode=${{ github.run_number }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: clients/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'

      - name: Download WinTun
        run: |
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile wintun.zip
          Expand-Archive wintun.zip -DestinationPath wintun
          Copy-Item wintun/wintun/bin/amd64/wintun.dll clients/windows/VPNClient/

      - name: Compute version
        run: |
          if ("$env:GITHUB_REF" -like "refs/tags/v*") { $v = $env:GITHUB_REF_NAME -replace '^v','' } else { $v = "0.0.0" }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows EXE
        working-directory: clients/windows
        run: |
          dotnet publish VPNClient/VPNClient.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=$env:APP_VERSION -o ./publish

      - name: Copy WinTun to output
        run: |
          Copy-Item wintun/wintun/bin/amd64/wintun.dll clients/windows/publish/

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer
        working-directory: clients/windows
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$env:APP_VERSION installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: clients/windows/installer_output/*.exe

  # macOS build skipped - use TestFlight for distribution

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/android-apk/*
            artifacts/windows-installer/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
