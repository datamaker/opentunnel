name: Server (Rust) CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'server-rust/**'
      - '.github/workflows/server-rust.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server-rust/**'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: datamaker/opentunnel

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rust

      - name: Build
        working-directory: ./server-rust
        run: cargo build --verbose

      - name: Test
        working-directory: ./server-rust
        run: cargo test --verbose

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tagged `rust` (and `rust-<sha>`) so it never clobbers the Node.js
          # server's `latest` tag on the same repository.
          tags: |
            type=raw,value=rust
            type=sha,prefix=rust-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server-rust
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
