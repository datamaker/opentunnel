# Override to run the Rust VPN server instead of the Node.js one.
#
# Usage (from the repo root, on the server):
#   docker compose -f docker-compose.yml -f docker-compose.rust.yml up -d --build
#
# Everything else (ports, NET_ADMIN, /dev/net/tun, env, PostgreSQL) is inherited
# from docker-compose.yml — the Rust server honors the same environment.
services:
  vpn-server:
    build:
      context: ./server-rust
      dockerfile: Dockerfile
    image: datamaker/opentunnel:rust
